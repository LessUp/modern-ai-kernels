name: Feature Request
description: Suggest a scoped improvement that fits the repository closeout direction
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement.
        This repository is intentionally prioritizing stabilization and cleanup, so please explain
        why this request belongs in the project now.

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear and concise description of the feature you'd like to see.
      placeholder: Describe the feature...
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Describe the concrete problem this improvement solves.
      placeholder: |
        As a [type of user], I want [goal] so that [benefit].

        Example: As a deep learning researcher, I want optimized sparse attention kernels so that I can train large language models more efficiently.
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: If you have ideas on how this could be implemented, please share them.
      placeholder: Describe your proposed solution...

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      description: What category does this request fall under?
      options:
        - Correctness / bug prevention
        - Documentation / discoverability
        - Build / packaging / workflow
        - API cleanup
        - Performance follow-up
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Why now?
      description: Help maintainers decide whether this should be part of closeout work.
      options:
        - It closes a correctness or usability gap
        - It removes maintenance burden
        - It is nice to have, but not urgent

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      description: Would you be willing to contribute to this feature?
      options:
        - label: I would be willing to submit a PR for this feature
        - label: I can help with testing
        - label: I can help with documentation

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, references, or screenshots about the feature request.
