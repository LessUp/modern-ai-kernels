title: TensorCraft-HPC
description: Modern C++17/CUDA AI Kernel Library — Elementwise, GEMM, FlashAttention, Conv2D, SpMV, FP8
remote_theme: pages-themes/cayman@v0.2.0

url: "https://lessup.github.io"
baseurl: "/modern-ai-kernels"
lang: zh-CN

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

exclude:
  - src
  - include
  - tests
  - benchmarks
  - examples
  - cmake
  - .github
  - .vscode
  - .kiro
  - .clang-format
  - .clang-tidy
  - .editorconfig
  - .gitattributes
  - .gitignore
  - .pre-commit-config.yaml
  - CMakeLists.txt
  - CMakePresets.json
  - Makefile
  - "*.o"
  - "*.so"
  - "*.a"
  - "*.cubin"
  - "*.fatbin"
  - "*.ptx"
  - build
  - cmake-build-*
  - __pycache__
  - "*.egg-info"
  - node_modules
