title: TensorCraft-HPC
description: >-
  Modern C++17/CUDA AI Kernel Library — Elementwise, GEMM, FlashAttention, Conv2D, SpMV, FP8
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
repository: LessUp/modern-ai-kernels
show_downloads: false

# SEO & metadata
url: https://lessup.github.io
baseurl: /modern-ai-kernels
lang: en
author: LessUp

# Markdown rendering
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# Navigation
navigation:
  - title: "Home"
    url: "/"
  - title: "English Docs"
    url: "/docs/en/"
  - title: "中文文档"
    url: "/docs/zh/"
  - title: "Changelog"
    url: "/CHANGELOG"

# Default layout for all pages
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "docs"
    values:
      layout: default
  - scope:
      path: "docs/getting-started"
    values:
      layout: default
  - scope:
      path: "docs/guides"
    values:
      layout: default
  - scope:
      path: "docs/api"
    values:
      layout: default
  - scope:
      path: "docs/examples"
    values:
      layout: default
  - scope:
      path: "docs/reference"
    values:
      layout: default
  - scope:
      path: "changelog"
    values:
      layout: default

# Exclude irrelevant files from Jekyll build
exclude:
  - src
  - include
  - tests
  - benchmarks
  - examples
  - cmake
  - .github
  - .vscode
  - .kiro
  - .clang-format
  - .clang-tidy
  - .editorconfig
  - .gitattributes
  - .gitignore
  - .pre-commit-config.yaml
  - CMakeLists.txt
  - CMakePresets.json
  - Makefile
  - "*.o"
  - "*.so"
  - "*.a"
  - "*.cubin"
  - "*.fatbin"
  - "*.ptx"
  - build
  - cmake-build-*
  - __pycache__
  - "*.egg-info"
  - node_modules
  - Gemfile
  - Gemfile.lock

# Include these files
include:
  - index.md
  - README.md
  - README.zh-CN.md
  - CHANGELOG.md
  - LICENSE
