      <rect width="190" height="26" rx="13" fill="#172554" stroke="#1e40af"/>
      <text x="95" y="17" text-anchor="middle" fill="#93c5fd" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600">Whitepaper &amp; Evidence</text>
      <rect x="206" width="136" height="26" rx="13" fill="#172554" stroke="#1e40af"/>
      <text x="274" y="17" text-anchor="middle" fill="#93c5fd" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600">Kernel Atlas</text>
      <rect x="354" width="140" height="26" rx="13" fill="#172554" stroke="#1e40af"/>
      <text x="424" y="17" text-anchor="middle" fill="#93c5fd" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600">Academy Routes</text>
      <rect x="508" width="132" height="26" rx="13" fill="#172554" stroke="#1e40af"/>
      <text x="574" y="17" text-anchor="middle" fill="#93c5fd" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600">Bilingual Mirror</text>
      <rect x="654" width="74" height="26" rx="13" fill="#064e3b" stroke="#059669"/>
      <text x="691" y="17" text-anchor="middle" fill="#34d399" font-family="JetBrains Mono, monospace" font-size="10" font-weight="700">EN / ZH</text>
    </g>
  </g>

  <path d="M430 206v30" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" stroke-dasharray="6 4"/>
  <path d="M430 232l-6 6h12l-6-6Z" fill="#60a5fa"/>

  <g transform="translate(56 240)">
    <rect width="748" height="110" rx="18" fill="url(#archKernelDark)" stroke="#334155" stroke-width="1.5" filter="url(#archShadowDark)"/>
    <text x="20" y="28" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" letter-spacing="0.06em">KERNEL SYSTEM</text>
