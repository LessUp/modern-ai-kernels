      <text x="238" y="22" text-anchor="middle" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600">Attention</text>
      <rect x="328" width="148" height="36" rx="12" fill="#1e293b" stroke="#475569"/>
      <text x="402" y="22" text-anchor="middle" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600">Normalization</text>
      <rect x="492" width="118" height="36" rx="12" fill="#1e293b" stroke="#475569"/>
      <text x="551" y="22" text-anchor="middle" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600">Conv2D</text>
      <rect x="624" width="104" height="36" rx="12" fill="#1e293b" stroke="#475569"/>
      <text x="676" y="22" text-anchor="middle" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600">Sparse</text>
    </g>
    <g transform="translate(20 18)">
      <rect x="500" width="110" height="20" rx="10" fill="#059669" fill-opacity="0.15" stroke="#059669" stroke-width="1"/>
      <text x="555" y="13" text-anchor="middle" fill="#34d399" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="600">progressive opt</text>
      <rect x="624" width="104" height="20" rx="10" fill="#c2410c" fill-opacity="0.15" stroke="#c2410c" stroke-width="1"/>
      <text x="676" y="13" text-anchor="middle" fill="#fb923c" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="600">benchmark</text>
    </g>
