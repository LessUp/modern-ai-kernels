  <path d="M430 350v30" stroke="#34d399" stroke-width="3" stroke-linecap="round" stroke-dasharray="6 4"/>
  <path d="M430 376l-6 6h12l-6-6Z" fill="#34d399"/>

  <g transform="translate(56 384)">
    <rect width="364" height="36" rx="18" fill="#064e3b" stroke="#059669" stroke-width="1.5"/>
    <text x="182" y="22" text-anchor="middle" fill="#34d399" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600">Memory primitives, feature detection, RAII tensor wrappers</text>
