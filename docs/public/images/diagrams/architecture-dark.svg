<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 470" width="860" height="470" fill="none">
  <defs>
    <linearGradient id="archBgDark" x1="0" y1="0" x2="860" y2="470">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="archPanelDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#111827" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="archKernelDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="archShadowDark" x="-4" y="-4" width="20" height="20">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="860" height="470" rx="24" fill="url(#archBgDark)"/>
  <rect x="24" y="24" width="812" height="422" rx="18" fill="url(#archPanelDark)" stroke="#1e293b" stroke-width="1.5"/>

  <text x="56" y="68" fill="#e2e8f0" font-family="Fraunces, Inter, serif" font-size="28" font-weight="800">TensorCraft-HPC Architecture</text>
  <text x="56" y="94" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500">Whitepaper surface, kernel system, and hardware-aware primitives shown as one evaluable stack.</text>

  <g transform="translate(56 126)">
    <rect width="748" height="80" rx="16" fill="#0f172a" stroke="#60a5fa" stroke-width="1.5" filter="url(#archShadowDark)"/>
    <text x="20" y="26" fill="#60a5fa" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" letter-spacing="0.06em">PUBLIC SURFACE</text>
