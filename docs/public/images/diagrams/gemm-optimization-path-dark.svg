<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 340" width="940" height="340" fill="none">
  <rect width="940" height="340" rx="28" fill="#0F141A"/>
  <rect x="24" y="24" width="892" height="292" rx="22" fill="#171E26" stroke="#344152"/>
  <text x="56" y="70" fill="#F3EFE8" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">GEMM optimization path</text>
  <text x="56" y="94" fill="#A5B2C0" font-family="Inter, Arial, sans-serif" font-size="14">From readable baseline to Tensor Core aware implementation, with each step preserving the reasoning chain.</text>

  <line x1="116" y1="148" x2="820" y2="148" stroke="#344152" stroke-width="6" stroke-linecap="round"/>
  <line x1="116" y1="148" x2="820" y2="148" stroke="#C96E32" stroke-width="6" stroke-linecap="round" stroke-dasharray="136 28"/>

  <g transform="translate(116 126)">
    <circle r="16" fill="#171E26" stroke="#C96E32" stroke-width="4"/>
    <text y="5" text-anchor="middle" fill="#F3EFE8" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600">1</text>
    <rect x="-74" y="42" width="148" height="104" rx="18" fill="#1D2630" stroke="#344152"/>
    <text y="72" text-anchor="middle" fill="#F3EFE8" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Naive</text>
    <text y="94" text-anchor="middle" fill="#A5B2C0" font-family="Inter, Arial, sans-serif" font-size="12">Direct loops</text>
    <text y="114" text-anchor="middle" fill="#A5B2C0" font-family="Inter, Arial, sans-serif" font-size="12">Global memory bound</text>
    <text y="132" text-anchor="middle" fill="#F0B189" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600">~5% cuBLAS</text>
  </g>

  <g transform="translate(344 126)">
    <circle r="16" fill="#171E26" stroke="#C96E32" stroke-width="4"/>
    <text y="5" text-anchor="middle" fill="#F3EFE8" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600">2</text>
    <rect x="-74" y="42" width="148" height="104" rx="18" fill="#1D2630" stroke="#344152"/>
    <text y="72" text-anchor="middle" fill="#F3EFE8" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Tiled</text>
    <text y="94" text-anchor="middle" fill="#A5B2C0" font-family="Inter, Arial, sans-serif" font-size="12">Shared memory reuse</text>
    <text y="114" text-anchor="middle" fill="#A5B2C0" font-family="Inter, Arial, sans-serif" font-size="12">Better data locality</text>
    <text y="132" text-anchor="middle" fill="#F0B189" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600">~45% cuBLAS</text>
  </g>

  <g transform="translate(572 126)">
    <circle r="16" fill="#171E26" stroke="#5DB7A4" stroke-width="4"/>
    <text y="5" text-anchor="middle" fill="#F3EFE8" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600">3</text>
    <rect x="-74" y="42" width="148" height="104" rx="18" fill="#1D2630" stroke="#344152"/>
    <text y="72" text-anchor="middle" fill="#F3EFE8" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Double buffer</text>
    <text y="94" text-anchor="middle" fill="#A5B2C0" font-family="Inter, Arial, sans-serif" font-size="12">Pipeline loads and compute</text>
    <text y="114" text-anchor="middle" fill="#A5B2C0" font-family="Inter, Arial, sans-serif" font-size="12">Hide memory latency</text>
    <text y="132" text-anchor="middle" fill="#A8E1D5" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600">~75% cuBLAS</text>
  </g>

  <g transform="translate(800 126)">
    <circle r="16" fill="#5DB7A4" stroke="#4B8C7F" stroke-width="4"/>
    <text y="5" text-anchor="middle" fill="#0F141A" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700">4</text>
    <rect x="-74" y="42" width="148" height="104" rx="18" fill="#0F141A" stroke="#405062"/>
    <text y="72" text-anchor="middle" fill="#F3EFE8" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Tensor Core</text>
    <text y="94" text-anchor="middle" fill="#A5B2C0" font-family="Inter, Arial, sans-serif" font-size="12">WMMA and mixed precision</text>
    <text y="114" text-anchor="middle" fill="#A5B2C0" font-family="Inter, Arial, sans-serif" font-size="12">Throughput-first tuning</text>
    <text y="132" text-anchor="middle" fill="#F0B189" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600">~92% cuBLAS</text>
  </g>
</svg>
