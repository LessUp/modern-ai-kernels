<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Background rounded square -->
  <rect x="4" y="4" width="120" height="120" rx="24" fill="#1a1a1a"/>
  <!-- Border -->
  <rect x="4" y="4" width="120" height="120" rx="24" stroke="#76B900" stroke-width="3" fill="none"/>
  <!-- Grid pattern representing matrix/tensor -->
  <g stroke="#76B900" stroke-width="2.5" stroke-linecap="round">
    <!-- Row 1 -->
    <line x1="32" y1="40" x2="96" y2="40"/>
    <line x1="32" y1="58" x2="96" y2="58"/>
    <line x1="32" y1="76" x2="96" y2="76"/>
    <!-- Col 1 -->
    <line x1="44" y1="28" x2="44" y2="92"/>
    <line x1="64" y1="28" x2="64" y2="92"/>
    <line x1="84" y1="28" x2="84" y2="92"/>
  </g>
  <!-- Highlight cells for tensor operation -->
  <rect x="34" y="30" width="10" height="10" rx="2" fill="#76B900" opacity="0.6"/>
  <rect x="54" y="48" width="10" height="10" rx="2" fill="#76B900" opacity="0.6"/>
  <rect x="74" y="66" width="10" height="10" rx="2" fill="#76B900" opacity="0.6"/>
  <!-- Accent mark -->
  <rect x="54" y="30" width="10" height="10" rx="2" fill="#fff" opacity="0.3"/>
  <rect x="74" y="48" width="10" height="10" rx="2" fill="#fff" opacity="0.3"/>
  <rect x="34" y="66" width="10" height="10" rx="2" fill="#fff" opacity="0.3"/>
</svg>