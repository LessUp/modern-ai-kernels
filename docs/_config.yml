# TensorCraft-HPC Documentation Site
# GitHub Pages Configuration

# ───────────────────────────────────────────────────────────────
# Site Configuration
# ───────────────────────────────────────────────────────────────
title: TensorCraft-HPC
description: >-
  Modern C++/CUDA AI High-Performance Computing Kernel Library
url: "https://lessup.github.io"
baseurl: "/modern-ai-kernels"
repository: LessUp/modern-ai-kernels

# ───────────────────────────────────────────────────────────────
# Theme Configuration
# ───────────────────────────────────────────────────────────────
remote_theme: just-the-docs/just-the-docs

# ───────────────────────────────────────────────────────────────
# Just the Docs Settings
# ───────────────────────────────────────────────────────────────
color_scheme: dark
search_enabled: true
enable_copy_code_button: true
back_to_top: true
heading_anchors: true

nav_external_links:
  - title: "GitHub Repository"
    url: "https://github.com/LessUp/modern-ai-kernels"
    hide_icon: false

# ───────────────────────────────────────────────────────────────
# Build Settings
# ───────────────────────────────────────────────────────────────
markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  input: GFM
  hard_wrap: false

# ───────────────────────────────────────────────────────────────
# Plugins
# ───────────────────────────────────────────────────────────────
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# ───────────────────────────────────────────────────────────────
# Exclude Files
# ───────────────────────────────────────────────────────────────
exclude:
  - .gitignore
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/

# ───────────────────────────────────────────────────────────────
# Defaults
# ───────────────────────────────────────────────────────────────
defaults:
  - scope:
      path: "en"
    values:
      layout: "default"
  - scope:
      path: "zh"
    values:
      layout: "default"
