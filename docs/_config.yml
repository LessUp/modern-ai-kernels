# TensorCraft-HPC Documentation Site
# GitHub Pages Configuration

# ───────────────────────────────────────────────────────────────
# Site Configuration
# ───────────────────────────────────────────────────────────────
title: TensorCraft-HPC
description: "Modern C++/CUDA AI High-Performance Computing Kernel Library"
url: "https://lessup.github.io"
baseurl: "/modern-ai-kernels"
repository: LessUp/modern-ai-kernels

# ───────────────────────────────────────────────────────────────
# Build Configuration
# ───────────────────────────────────────────────────────────────
markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  input: GFM
  hard_wrap: false
  toc_levels: "2,3"

# ───────────────────────────────────────────────────────────────
# Plugins
# ───────────────────────────────────────────────────────────────
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# ───────────────────────────────────────────────────────────────
# SEO & Social
# ───────────────────────────────────────────────────────────────
twitter:
  card: summary_large_image

social:
  name: TensorCraft-HPC
  links:
    - https://github.com/LessUp/modern-ai-kernels

# ───────────────────────────────────────────────────────────────
# Sass Configuration
# ───────────────────────────────────────────────────────────────
sass:
  sass_dir: _sass
  style: compressed

# ───────────────────────────────────────────────────────────────
# Defaults
# ───────────────────────────────────────────────────────────────
defaults:
  - scope:
      path: "en"
    values:
      lang: en
      layout: docs
  - scope:
      path: "zh"
    values:
      lang: zh
      layout: docs
  - scope:
      path: "index.html"
    values:
      layout: landing

# ───────────────────────────────────────────────────────────────
# Exclude Files
# ───────────────────────────────────────────────────────────────
exclude:
  - .gitignore
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/
  - "*.gemspec"
  - "*.gem"
